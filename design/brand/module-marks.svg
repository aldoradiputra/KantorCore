<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" width="520" height="280" fill="none">
  <rect width="520" height="280" fill="#F9FAFB"/>

  <!-- Title -->
  <text x="16" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4B5563" letter-spacing="0.5">MODULE MARKS — KantorCore 24×24</text>

  <!-- Grid: 5 columns × 3 rows, each cell 96×80 -->
  <!-- Cell layout: icon centered in 24×24, label below -->

  <!-- Helper macro: each icon at origin 0,0 24×24 then translated -->

  <!-- ROW 1 -->

  <!-- 1. Home / Dashboard -->
  <g transform="translate(20, 36)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- House shape: roof triangle + body -->
      <path d="M12 3L3 9.5V21h6v-5h6v5h6V9.5L12 3Z" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <rect x="8" y="14" width="8" height="7" rx="1" fill="#3B4FC4" opacity="0.25"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Home</text>
  </g>

  <!-- 2. Chat -->
  <g transform="translate(86, 36)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Chat bubble with tail -->
      <path d="M3 4h18a1 1 0 011 1v10a1 1 0 01-1 1H8l-4 3v-3H3a1 1 0 01-1-1V5a1 1 0 011-1Z" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- 3 dots -->
      <circle cx="8" cy="9.5" r="1.2" fill="#3B4FC4"/>
      <circle cx="12" cy="9.5" r="1.2" fill="#3B4FC4"/>
      <circle cx="16" cy="9.5" r="1.2" fill="#3B4FC4"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Chat</text>
  </g>

  <!-- 3. Projects -->
  <g transform="translate(152, 36)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Kanban columns -->
      <rect x="2"  y="4" width="5" height="12" rx="1.5" fill="#3B4FC4"/>
      <rect x="9.5" y="7" width="5" height="9" rx="1.5" fill="#3B4FC4" opacity="0.6"/>
      <rect x="17" y="5" width="5" height="11" rx="1.5" fill="#3B4FC4" opacity="0.35"/>
      <!-- Base line -->
      <line x1="2" y1="19" x2="22" y2="19" stroke="#3B4FC4" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Projects</text>
  </g>

  <!-- 4. HR -->
  <g transform="translate(218, 36)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Person silhouette -->
      <circle cx="12" cy="7" r="3.5" fill="none" stroke="#3B4FC4" stroke-width="1.8"/>
      <!-- Two person outline for group -->
      <circle cx="7" cy="9" r="2.5" fill="none" stroke="#3B4FC4" stroke-width="1.5" opacity="0.5"/>
      <path d="M2 20c0-3 2-5 5-5" stroke="#3B4FC4" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <path d="M7 15c0 0 1.5-1 5-1s5 1 5 1c2.5 1 3.5 3 3.5 5H7.5" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">HR</text>
  </g>

  <!-- 5. Finance -->
  <g transform="translate(284, 36)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Stacked bars with upward trend -->
      <rect x="2"  y="12" width="5" height="8" rx="1" fill="#3B4FC4" opacity="0.4"/>
      <rect x="9.5" y="8" width="5" height="12" rx="1" fill="#3B4FC4" opacity="0.7"/>
      <rect x="17" y="4" width="5" height="16" rx="1" fill="#3B4FC4"/>
      <!-- Rp symbol -->
      <text x="0" y="5" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#3B4FC4">Rp</text>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Finance</text>
  </g>

  <!-- 6. Payroll -->
  <g transform="translate(350, 36)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Person + coin/circle -->
      <circle cx="9" cy="6.5" r="3" fill="none" stroke="#3B4FC4" stroke-width="1.8"/>
      <path d="M3 20c0-3.5 2.7-5.5 6-5.5" stroke="#3B4FC4" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Coin stack -->
      <ellipse cx="18" cy="17" rx="4" ry="1.5" fill="#3B4FC4" opacity="0.35"/>
      <ellipse cx="18" cy="14.5" rx="4" ry="1.5" fill="#3B4FC4" opacity="0.6"/>
      <ellipse cx="18" cy="12" rx="4" ry="1.5" fill="#3B4FC4"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Payroll</text>
  </g>

  <!-- 7. Inventory -->
  <g transform="translate(416, 36)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Box / package -->
      <path d="M12 2L22 7v10L12 22 2 17V7L12 2Z" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- Horizontal crease -->
      <line x1="2" y1="7" x2="12" y2="12" stroke="#3B4FC4" stroke-width="1.5"/>
      <line x1="22" y1="7" x2="12" y2="12" stroke="#3B4FC4" stroke-width="1.5"/>
      <line x1="12" y1="12" x2="12" y2="22" stroke="#3B4FC4" stroke-width="1.5"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Inventory</text>
  </g>

  <!-- ROW 2 -->

  <!-- 8. Procurement -->
  <g transform="translate(20, 116)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Cart + checkmark -->
      <path d="M2 3h2l2.5 10h11L20 7H6" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="9" cy="20" r="1.5" fill="#3B4FC4"/>
      <circle cx="17" cy="20" r="1.5" fill="#3B4FC4"/>
      <!-- Check -->
      <path d="M14 10l2 2 4-4" stroke="#0F7B6C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Procurement</text>
  </g>

  <!-- 9. Sales -->
  <g transform="translate(86, 116)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Upward arrow with dollar -->
      <polyline points="3,18 8,11 13,14 21,4" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="16,4 21,4 21,9" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Sales</text>
  </g>

  <!-- 10. CRM -->
  <g transform="translate(152, 116)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Heart + person -->
      <circle cx="12" cy="6" r="3" fill="none" stroke="#3B4FC4" stroke-width="1.8"/>
      <path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Small heart -->
      <path d="M17 5c0-1 .8-2 2-2 1.2 0 2 .9 2 2 0 1-1 2-2 3-1-1-2-2-2-3Z" fill="#3B4FC4" opacity="0.7"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">CRM</text>
  </g>

  <!-- 11. Help Desk -->
  <g transform="translate(218, 116)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Headphone shape -->
      <path d="M4 14c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linecap="round"/>
      <rect x="2" y="13" width="4" height="6" rx="2" fill="#3B4FC4"/>
      <rect x="18" y="13" width="4" height="6" rx="2" fill="#3B4FC4"/>
      <path d="M20 19v2a2 2 0 01-2 2h-3" fill="none" stroke="#3B4FC4" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Help Desk</text>
  </g>

  <!-- 12. Email -->
  <g transform="translate(284, 116)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Envelope -->
      <rect x="2" y="5" width="20" height="14" rx="2" fill="none" stroke="#3B4FC4" stroke-width="1.8"/>
      <polyline points="2,6 12,13 22,6" fill="none" stroke="#3B4FC4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Email</text>
  </g>

  <!-- 13. Omnichannel -->
  <g transform="translate(350, 116)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Hub and spoke: center dot, 5 outer nodes -->
      <circle cx="12" cy="12" r="2.5" fill="#3B4FC4"/>
      <!-- Spokes -->
      <line x1="12" y1="9.5" x2="12" y2="3" stroke="#3B4FC4" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="14" y1="10.5" x2="20" y2="6" stroke="#3B4FC4" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="14" y1="13.5" x2="20" y2="18" stroke="#3B4FC4" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="10" y1="13.5" x2="4" y2="18" stroke="#3B4FC4" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="10" y1="10.5" x2="4" y2="6" stroke="#3B4FC4" stroke-width="1.4" stroke-linecap="round"/>
      <!-- Outer dots -->
      <circle cx="12" cy="3" r="1.8" fill="#3B4FC4" opacity="0.6"/>
      <circle cx="20" cy="6" r="1.8" fill="#3B4FC4" opacity="0.6"/>
      <circle cx="20" cy="18" r="1.8" fill="#3B4FC4" opacity="0.6"/>
      <circle cx="4" cy="18" r="1.8" fill="#3B4FC4" opacity="0.6"/>
      <circle cx="4" cy="6" r="1.8" fill="#3B4FC4" opacity="0.6"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Omnichannel</text>
  </g>

  <!-- 14. AI Search -->
  <g transform="translate(416, 116)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Magnifying glass + sparkle -->
      <circle cx="10" cy="10" r="5.5" fill="none" stroke="#3B4FC4" stroke-width="1.8"/>
      <line x1="14" y1="14" x2="20" y2="20" stroke="#3B4FC4" stroke-width="2" stroke-linecap="round"/>
      <!-- Sparkle / star at top right -->
      <path d="M19 3l.7 1.5L21 5l-1.3.7L19 7l-.7-1.3L17 5l1.3-.7Z" fill="#3B4FC4"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">AI Search</text>
  </g>

  <!-- ROW 3 — single item: Agent -->

  <!-- 15. Agent -->
  <g transform="translate(20, 196)">
    <rect width="52" height="60" rx="6" fill="#EEF0FC"/>
    <g transform="translate(14, 10)">
      <!-- Robot / agent face -->
      <rect x="4" y="6" width="16" height="12" rx="3" fill="none" stroke="#3B4FC4" stroke-width="1.8"/>
      <!-- Eyes -->
      <circle cx="9" cy="11" r="1.8" fill="#3B4FC4"/>
      <circle cx="15" cy="11" r="1.8" fill="#3B4FC4"/>
      <!-- Antenna -->
      <line x1="12" y1="6" x2="12" y2="2" stroke="#3B4FC4" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="12" cy="2" r="1.5" fill="#0F7B6C"/>
      <!-- Legs -->
      <line x1="8" y1="18" x2="8" y2="22" stroke="#3B4FC4" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="18" x2="16" y2="22" stroke="#3B4FC4" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="26" y="58" font-family="system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#1A2B5A" text-anchor="middle">Agent</text>
  </g>

  <!-- Footer label -->
  <text x="16" y="270" font-family="system-ui, sans-serif" font-size="9" fill="#9CA3AF">KantorCore Module Icon System — v1.0 — All marks 24×24, stroke-based, #3B4FC4 primary</text>
</svg>
